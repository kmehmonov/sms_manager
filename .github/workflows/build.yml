name: Android CI — APK Build

# GitHub'ga push yoki pull request bo'lganda avtomatik build
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Kodni yuklab olish
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      # 2. Java 17 o'rnatish (Android build uchun kerak)
      - name: Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Haqiqiy gradle-wrapper.jar ni yuklab olish
      # (Stub jar o'rniga haqiqiy Gradle wrapper kerak)
      - name: Gradle wrapper jar ni yuklab olish
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          wget -q "https://services.gradle.org/distributions/gradle-8.7-bin.zip" -O /tmp/gradle.zip && \
          cd /tmp && unzip -q gradle.zip && \
          cp gradle-8.7/lib/gradle-wrapper*.jar $GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar || \
          echo "Warning: Could not download wrapper jar"
          chmod +x gradlew

      # 4. Gradle Setup Action — eng ishonchli usul
      - name: Gradle'ni sozlash
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # 5. Debug APK build qilish
      - name: Debug APK build
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      # 6. APK faylini artifact sifatida saqlash
      # Build tugagandan so'ng "Actions" bo'limidan yuklab olsa bo'ladi
      - name: APK ni saqlash
        uses: actions/upload-artifact@v4
        with:
          name: sms-manager-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 7. Build muvaffaqiyatli tugaganini tekshirish
      - name: APK mavjudligini tekshirish
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK muvaffaqiyatli yaratildi!"
            ls -lh app/build/outputs/apk/debug/
          else
            echo "❌ APK yaratilmadi!"
            exit 1
          fi
