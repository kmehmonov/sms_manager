name: Android CI — APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle distributivini yuklab, to'g'ri wrapper yaratish
        run: |
          # Gradle 8.7 ni yuklab olamiz
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          GRADLE_BIN="/tmp/gradle-dist/gradle-8.7/bin/gradle"
          chmod +x "$GRADLE_BIN"

          # Haqiqiy gradle-wrapper.jar bilan to'g'ri wrapper yaratamiz
          "$GRADLE_BIN" wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

          echo "✓ Wrapper yaratildi:"
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Debug APK build
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: APK ni saqlash
        uses: actions/upload-artifact@v4
        with:
          name: sms-manager-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Natija
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "✅ APK muvaffaqiyatli yaratildi!"
            ls -lh "$APK"
          else
            echo "❌ APK yaratilmadi"
            exit 1
          fi
