name: Android CI — APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle rasmiy GitHub Action — wrapper kerak emas, to'g'ridan Gradle ishlatadi
      - name: Gradle 8.7 o'rnatish
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      # gradlew emas, to'g'ridan "gradle" buyrug'i bilan build qilamiz
      - name: Debug APK build
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: ${{ github.workspace }}

      - name: APK ni saqlash
        uses: actions/upload-artifact@v4
        with:
          name: sms-manager-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Natija
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "✅ APK muvaffaqiyatli yaratildi! Hajmi: $(du -sh $APK | cut -f1)"
          else
            echo "❌ APK topilmadi"
            exit 1
          fi
