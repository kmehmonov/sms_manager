name: Android CI — APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle wrapper jar ni to'g'rilash
        run: |
          # Haqiqiy gradle-wrapper.jar ni Gradle distributividan olamiz
          GRADLE_VERSION="8.7"
          cd /tmp
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q "gradle-${GRADLE_VERSION}-bin.zip"
          cp "gradle-${GRADLE_VERSION}/lib/gradle-wrapper-"*.jar \
             "$GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || \
          find "gradle-${GRADLE_VERSION}" -name "*.jar" | head -1 | \
             xargs -I{} cp {} "$GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar"
          echo "Jar hajmi: $(du -sh $GITHUB_WORKSPACE/gradle/wrapper/gradle-wrapper.jar)"
          chmod +x "$GITHUB_WORKSPACE/gradlew"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Debug APK build
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: APK ni saqlash
        uses: actions/upload-artifact@v4
        with:
          name: sms-manager-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Natija
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "✅ APK muvaffaqiyatli yaratildi!"
            ls -lh "$APK"
          else
            echo "❌ APK yaratilmadi"
            exit 1
          fi
